name: Deploy launch page + demo to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - name: Compose static site (landing at /, guest-playable demo at /play/)
        run: |
          mkdir -p _site/play/vendor
          cp client/landing.html _site/index.html
          cp client/index.html _site/play/index.html
          cp -r client/css client/js _site/play/
          cp node_modules/three/build/three.module.js node_modules/three/build/three.core.js _site/play/vendor/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
